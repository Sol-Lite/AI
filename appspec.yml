version: 0.0
os: linux
files:
  - source: /
    destination: /opt/fastapi
    overwrite: true
file_exists_behavior: OVERWRITE
permissions:
  - object: /opt/fastapi
    owner: ubuntu
    group: ubuntu
    mode: "755"
    type:
      - directory
  - object: /opt/fastapi/scripts
    owner: ubuntu
    group: ubuntu
    mode: "755"
    type:
      - file
hooks:
  BeforeInstall:
    - location: scripts/stop.sh
      timeout: 60
      runas: root
  AfterInstall:
    - location: scripts/install.sh
      timeout: 300
      runas: root
  ApplicationStart:
    - location: scripts/start.sh
      timeout: 60
      runas: root
  ValidateService:
    - location: scripts/validate.sh
      timeout: 60
      runas: root
